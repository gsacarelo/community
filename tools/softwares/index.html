<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>🧰 Tool Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ---------- Background ---------- */
      .bg-grid {
        background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
        background-size: 22px 22px;
      }
      .glow { filter: blur(70px); opacity: 0.55; }

      /* ---------- Animations ---------- */
      @keyframes floaty {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-14px); }
        100% { transform: translateY(0px); }
      }
      @keyframes popIn {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0px) scale(1); }
      }
      @keyframes pulseGlow {
        0%,100% { filter: drop-shadow(0 0 0 rgba(99,102,241,0)); }
        50%     { filter: drop-shadow(0 0 18px rgba(99,102,241,0.35)); }
      }
      @keyframes clickBump {
        0%   { transform: scale(1); }
        45%  { transform: scale(0.97); }
        100% { transform: scale(1); }
      }
      .animate-floaty { animation: floaty 7s ease-in-out infinite; }
      .card-enter { animation: popIn 420ms cubic-bezier(0.2, 0.9, 0.2, 1) both; }
      .pulse-glow { animation: pulseGlow 3.2s ease-in-out infinite; }
      .click-bump:active { animation: clickBump 160ms ease; }

      /* ---------- Cards ---------- */
      .tool-card {
        transition: transform 200ms ease, box-shadow 220ms ease, border-color 220ms ease, background-color 220ms ease;
        will-change: transform;
      }
      .tool-card:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 22px 70px rgba(0,0,0,0.55);
      }
      .tool-card:active {
        transform: translateY(-2px) scale(0.99);
      }

      /* ---------- Scrollbar ---------- */
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: rgba(24,24,27,0.8); }
      ::-webkit-scrollbar-thumb { background: rgba(113,113,122,0.35); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(113,113,122,0.55); }
    </style>
  </head>

  <body class="min-h-screen bg-zinc-950 text-zinc-100">
    <!-- Ambient background -->
    <div class="fixed inset-0 -z-10 bg-grid"></div>
    <div class="fixed inset-0 -z-20">
      <div class="absolute -top-24 -left-24 h-80 w-80 rounded-full bg-indigo-600 glow animate-floaty"></div>
      <div class="absolute top-24 -right-24 h-80 w-80 rounded-full bg-fuchsia-600 glow animate-floaty" style="animation-delay:1.1s"></div>
      <div class="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-sky-600 glow animate-floaty" style="animation-delay:2.2s"></div>
    </div>

    <div class="max-w-7xl mx-auto p-5 sm:p-6">
      <!-- Header -->
      <header class="text-center mb-6 sm:mb-8">
        <div class="inline-flex items-center justify-center gap-3 px-5 py-3 rounded-2xl border border-zinc-800 bg-zinc-950/60 backdrop-blur">
          <span class="text-2xl pulse-glow">🧰</span>
          <div class="text-left">
            <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">Tool Library</h1>
            <p class="text-zinc-400 text-sm">Curated index for fast picking</p>
          </div>
        </div>

        <div class="mt-4 flex flex-wrap justify-center gap-2 sm:gap-3">
          <a
            href="../../index.html"
            class="click-bump px-4 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
            🏡 Main
          </a>

          <button
            id="toggleFilters"
            class="click-bump px-4 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
            🧮 Filters
          </button>

          <button
            id="toggleTags"
            class="click-bump px-4 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
            🏷 Tags
          </button>

          <button
            id="clearAll"
            class="click-bump px-4 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
            🧼 Clear
          </button>
        </div>
      </header>

      <!-- Top controls -->
      <section class="mb-4 sm:mb-5">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
          <!-- Search -->
          <div class="lg:col-span-2">
            <div class="relative">
              <input
                id="search"
                type="text"
                placeholder="Search tools by name, description, tags…"
                class="w-full px-4 py-3 rounded-2xl border border-zinc-800 bg-zinc-900/75 focus:outline-none focus:border-indigo-400 transition text-base" />
              <div class="pointer-events-none absolute right-4 top-3.5 text-zinc-500 text-sm">⌘K</div>
            </div>
          </div>

          <!-- Meta -->
          <div class="p-4 rounded-2xl border border-zinc-800 bg-zinc-950/60 backdrop-blur flex items-center justify-between gap-3">
            <div class="text-sm text-zinc-400">
              <div class="flex items-center gap-2">
                <span class="inline-flex h-2 w-2 rounded-full bg-emerald-400"></span>
                <span id="statusText">Loading…</span>
              </div>
              <div class="mt-1">
                Showing <span id="countShown" class="text-zinc-200">0</span> of
                <span id="countTotal" class="text-zinc-200">0</span>
              </div>
            </div>

            <div class="text-right">
              <div class="text-xs text-zinc-500">Per page</div>
              <select
                id="perPage"
                class="mt-1 px-3 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 text-sm focus:outline-none focus:border-indigo-400 transition">
                <option value="9">9</option>
                <option value="12" selected>12</option>
                <option value="18">18</option>
                <option value="24">24</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Filters (compact + multi-select chips) -->
      <section id="filtersWrap" class="hidden mb-3">
        <div class="p-3 sm:p-4 rounded-2xl border border-zinc-800 bg-zinc-950/60 backdrop-blur">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3">
            <div id="tierSlot" class="hidden">
              <div class="text-xs text-zinc-400 mb-1">🥇 Tier</div>
              <div id="tierChips" class="flex flex-wrap gap-2"></div>
            </div>

            <div id="licenseSlot" class="hidden">
              <div class="text-xs text-zinc-400 mb-1">📝 License</div>
              <div id="licenseChips" class="flex flex-wrap gap-2"></div>
            </div>

            <div id="typeSlot" class="hidden">
              <div class="text-xs text-zinc-400 mb-1">💻 Type</div>
              <div id="typeChips" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Sort -->
            <div>
              <div class="text-xs text-zinc-400 mb-1">🔃 Sort</div>
              <select
                id="sortBy"
                class="w-full px-3 py-2 sm:px-4 sm:py-3 rounded-2xl border border-zinc-800 bg-zinc-900/70 focus:outline-none focus:border-indigo-400 transition text-sm sm:text-base">
                <option value="tier_desc">Tier (best first)</option>
                <option value="name_asc" selected>Name (A→Z)</option>
              </select>
            </div>
          </div>

          <div class="mt-2 text-xs text-zinc-500 hidden sm:block">
            Select the filters to show.
          </div>
        </div>
      </section>

      <!-- Pagination controls (top) -->
      <section class="mb-4 flex items-center justify-between gap-3">
        <div id="chips" class="flex flex-wrap gap-2"></div>

        <div class="flex items-center gap-2">
          <button id="prevPage" class="click-bump px-3 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
            ◀️ Prev
          </button>
          <div class="text-sm text-zinc-400">
            Page <span id="pageNow" class="text-zinc-200">1</span>/<span id="pageMax" class="text-zinc-200">1</span>
          </div>
          <button id="nextPage" class="click-bump px-3 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
            ▶️ Next
          </button>
        </div>
      </section>

      <!-- Tool list -->
      <div id="tool-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5"></div>

      <!-- Pagination controls (bottom) -->
      <section class="mt-5 flex items-center justify-center gap-2">
        <button id="prevPage2" class="click-bump px-3 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
          ◀️ Prev
        </button>
        <div class="text-sm text-zinc-400">
          Page <span id="pageNow2" class="text-zinc-200">1</span>/<span id="pageMax2" class="text-zinc-200">1</span>
        </div>
        <button id="nextPage2" class="click-bump px-3 py-2 rounded-xl border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition">
          ▶️ Next
        </button>
      </section>

      <!-- Footer -->
      <footer class="mt-10 text-center text-xs text-zinc-500">
        <p>Built with ❤️ by <a href="https://www.instagram.com/gerardo711" target="_blank" rel="noopener" style="color: aliceblue">Gerardo Sacarelo V.</a></p>
      </footer>
    </div>

    <script>
      /******************************************************************
       * CONFIG
       ******************************************************************/
      const CSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTHEoRUmqY2Gj5hCN-nURcfC1p83tCjsKr79yDADeDAsmOqx51UZ6Ay_k0DXu9dNBq9HeG_NkhHD_x/pub?gid=0&single=true&output=csv";

      const HIDDEN_STATUSES = new Set(["hidden", "deactivate", "deprecated", "disabled"]);

      /******************************************************************
       * CSV PARSER (quoted commas supported)
       ******************************************************************/
      function parseCSV(text) {
        text = text.replace(/\r/g, "");
        const rows = [];
        let row = [];
        let cur = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const ch = text[i];

          if (ch === '"') {
            if (inQuotes && text[i + 1] === '"') {
              cur += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (ch === "," && !inQuotes) {
            row.push(cur);
            cur = "";
          } else if (ch === "\n" && !inQuotes) {
            row.push(cur);
            rows.push(row);
            row = [];
            cur = "";
          } else {
            cur += ch;
          }
        }

        if (cur.length || row.length) {
          row.push(cur);
          rows.push(row);
        }

        const clean = rows.filter((r) => r.some((c) => (c || "").trim().length > 0));

        const header = (clean[0] || []).map((h) =>
          (h || "").trim().toLowerCase().replace(/^\uFEFF/, "")
        );
        const dataRows = clean.slice(1);

        return { header, rows: dataRows };
      }

      /******************************************************************
       * DATA LOAD + NORMALIZATION
       ******************************************************************/
      async function loadTools() {
        const res = await fetch(CSV_URL, { cache: "no-store" });
        const text = await res.text();

        const { header, rows } = parseCSV(text);
        const idx = (name) => header.indexOf(name);

        const iName = idx("name");
        const iDesc = idx("description");
        const iLink = idx("link");
        const iTier = idx("tier");
        const iLicense = idx("license");
        const iType = idx("type");
        const iStatus = idx("status");
        const iTags = idx("tags");

        return rows
          .map((r) => ({
            name: (r[iName] || "").trim(),
            description: (r[iDesc] || "").trim(),
            link: (r[iLink] || "#").trim(),
            tier: (r[iTier] || "").trim(),
            license: (r[iLicense] || "").trim(),
            type: (r[iType] || "").trim(),
            status: (r[iStatus] || "active").trim(),
            tags: (r[iTags] || "")
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean),
          }))
          .filter((t) => t.name.length > 0);
      }

      /******************************************************************
       * UTIL
       ******************************************************************/
      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function hashHue(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
        return h % 360;
      }

      function setVisible(el, visible) {
        el.classList.toggle("hidden", !visible);
      }

      function statusPill(status) {
        const s = (status || "").toLowerCase();
        if (s === "testing") {
          return `<span class="px-2 py-1 rounded-full text-[12px] border border-amber-500/30 bg-amber-500/10 text-amber-200">Testing</span>`;
        }
        return `<span class="px-2 py-1 rounded-full text-[12px] border border-emerald-500/30 bg-emerald-500/10 text-emerald-200">Active</span>`;
      }

      function chipButton(label, active) {
        return `
          <button type="button"
            class="click-bump px-3 py-1.5 rounded-full border transition text-xs
                   ${active
                     ? "border-indigo-400 bg-indigo-500/15 text-zinc-100"
                     : "border-zinc-800 bg-zinc-900/60 text-zinc-200 hover:bg-zinc-800"}">
            ${escapeHtml(label)}
          </button>
        `;
      }

      /******************************************************************
       * STATE
       ******************************************************************/
      let ALL_TOOLS = [];
      let SHOW_TAGS = false;
      let PAGE = 1;

      let selectedTiers = new Set();
      let selectedLicenses = new Set();
      let selectedTypes = new Set();

      /******************************************************************
       * BASE: VISIBLE TOOLS
       ******************************************************************/
      function getVisibleToolsBase(allTools) {
        return allTools.filter((t) => {
          const s = (t.status || "active").trim().toLowerCase();
          return !HIDDEN_STATUSES.has(s);
        });
      }

      /******************************************************************
       * BUILD FILTER UI (chips)
       ******************************************************************/
      function buildAdaptiveFilters(allTools) {
        const base = getVisibleToolsBase(allTools);

        const tiers = [...new Set(base.map((t) => (t.tier || "").trim()).filter(Boolean))].sort(
          (a, b) => Number(b) - Number(a)
        );
        const licenses = [...new Set(base.map((t) => (t.license || "").trim()).filter(Boolean))].sort(
          (a, b) => a.localeCompare(b)
        );
        const types = [...new Set(base.map((t) => (t.type || "").trim()).filter(Boolean))].sort(
          (a, b) => a.localeCompare(b)
        );

        const showTier = tiers.length >= 2;
        const showLicense = licenses.length >= 2;
        const showType = types.length >= 2;

        setVisible(document.getElementById("tierSlot"), showTier);
        setVisible(document.getElementById("licenseSlot"), showLicense);
        setVisible(document.getElementById("typeSlot"), showType);

        // Tier chips
        if (showTier) {
          const wrap = document.getElementById("tierChips");
          wrap.innerHTML = tiers.map((v) => chipButton(`Tier ${v}`, selectedTiers.has(v))).join("");
          [...wrap.children].forEach((btn, i) => {
            const v = tiers[i];
            btn.onclick = () => {
              selectedTiers.has(v) ? selectedTiers.delete(v) : selectedTiers.add(v);
              PAGE = 1;
              buildAdaptiveFilters(ALL_TOOLS);
              update();
            };
          });
        } else {
          selectedTiers.clear();
          document.getElementById("tierChips").innerHTML = "";
        }

        // License chips
        if (showLicense) {
          const wrap = document.getElementById("licenseChips");
          wrap.innerHTML = licenses.map((v) => chipButton(v, selectedLicenses.has(v))).join("");
          [...wrap.children].forEach((btn, i) => {
            const v = licenses[i];
            btn.onclick = () => {
              selectedLicenses.has(v) ? selectedLicenses.delete(v) : selectedLicenses.add(v);
              PAGE = 1;
              buildAdaptiveFilters(ALL_TOOLS);
              update();
            };
          });
        } else {
          selectedLicenses.clear();
          document.getElementById("licenseChips").innerHTML = "";
        }

        // Type chips
        if (showType) {
          const wrap = document.getElementById("typeChips");
          wrap.innerHTML = types.map((v) => chipButton(v, selectedTypes.has(v))).join("");
          [...wrap.children].forEach((btn, i) => {
            const v = types[i];
            btn.onclick = () => {
              selectedTypes.has(v) ? selectedTypes.delete(v) : selectedTypes.add(v);
              PAGE = 1;
              buildAdaptiveFilters(ALL_TOOLS);
              update();
            };
          });
        } else {
          selectedTypes.clear();
          document.getElementById("typeChips").innerHTML = "";
        }
      }

      /******************************************************************
       * FILTER + SORT
       ******************************************************************/
      function applyFilters(allTools) {
        const q = document.getElementById("search").value.trim().toLowerCase();

        return getVisibleToolsBase(allTools).filter((t) => {
          const hay = (t.name + " " + t.description + " " + t.tags.join(" ")).toLowerCase();

          const matchesQuery = !q || hay.includes(q);

          // OR within each group, AND across groups
          const matchesTier = selectedTiers.size === 0 || selectedTiers.has(t.tier);
          const matchesLicense = selectedLicenses.size === 0 || selectedLicenses.has(t.license);
          const matchesType = selectedTypes.size === 0 || selectedTypes.has(t.type);

          return matchesQuery && matchesTier && matchesLicense && matchesType;
        });
      }

      function sortTools(tools) {
        const mode = document.getElementById("sortBy").value;

        if (mode === "name_asc") {
          return [...tools].sort((a, b) => a.name.localeCompare(b.name));
        }

        return [...tools].sort((a, b) => {
          const ta = Number(a.tier || 0);
          const tb = Number(b.tier || 0);
          if (tb !== ta) return tb - ta;
          return a.name.localeCompare(b.name);
        });
      }

      /******************************************************************
       * PAGINATION
       ******************************************************************/
      function paginate(tools) {
        const perPage = Number(document.getElementById("perPage").value || 12);
        const total = tools.length;
        const maxPage = Math.max(1, Math.ceil(total / perPage));

        PAGE = Math.min(Math.max(1, PAGE), maxPage);

        const start = (PAGE - 1) * perPage;
        const end = start + perPage;
        return { pageItems: tools.slice(start, end), total, maxPage, perPage };
      }

      /******************************************************************
       * CHIPS (active filter summary row)
       ******************************************************************/
      function setChip(container, key, value) {
        const id = `chip_${key}`;
        const existing = document.getElementById(id);

        if (!value) {
          if (existing) existing.remove();
          return;
        }

        const label = `${key}: ${value}`;
        const chip = `
          <button id="${id}" data-key="${escapeHtml(key)}"
            class="click-bump px-3 py-1.5 rounded-full border border-zinc-800 bg-zinc-900/70 hover:bg-zinc-800 transition text-xs text-zinc-200">
            ${escapeHtml(label)} <span class="text-zinc-500 ml-1">×</span>
          </button>`;

        if (existing) existing.outerHTML = chip;
        else container.insertAdjacentHTML("beforeend", chip);
      }

      function syncChips() {
        const chips = document.getElementById("chips");
        const q = document.getElementById("search").value.trim();

        const tierLabel =
          selectedTiers.size === 0 ? "" : [...selectedTiers].sort((a,b)=>Number(b)-Number(a)).map((v) => `T${v}`).join(", ");
        const licenseLabel =
          selectedLicenses.size === 0 ? "" : [...selectedLicenses].sort((a,b)=>a.localeCompare(b)).join(", ");
        const typeLabel =
          selectedTypes.size === 0 ? "" : [...selectedTypes].sort((a,b)=>a.localeCompare(b)).join(", ");

        setChip(chips, "q", q ? q : "");
        setChip(chips, "tier", tierLabel);
        setChip(chips, "license", licenseLabel);
        setChip(chips, "type", typeLabel);

        chips.querySelectorAll("button[id^='chip_']").forEach((btn) => {
          btn.onclick = () => {
            const key = btn.getAttribute("data-key");
            if (key === "q") document.getElementById("search").value = "";
            if (key === "tier") selectedTiers.clear();
            if (key === "license") selectedLicenses.clear();
            if (key === "type") selectedTypes.clear();
            PAGE = 1;
            buildAdaptiveFilters(ALL_TOOLS);
            update();
          };
        });
      }

      /******************************************************************
       * RENDER
       ******************************************************************/
      function toolCard(t, idx) {
        const hue = hashHue(t.name);
        const border = `hsl(${hue} 85% 60% / 0.35)`;

        const tagsHtml =
          SHOW_TAGS && t.tags && t.tags.length
            ? `<div class="mt-3 flex flex-wrap gap-2">
                ${t.tags
                  .slice(0, 10)
                  .map(
                    (tag) =>
                      `<span class="text-[12px] text-zinc-200 border border-zinc-800 bg-zinc-900/60 px-2 py-0.5 rounded-full">#${escapeHtml(
                        tag
                      )}</span>`
                  )
                  .join("")}
              </div>`
            : "";

        return `
          <div class="tool-card card-enter p-4 sm:p-5 rounded-2xl border border-zinc-800 bg-zinc-950/45 backdrop-blur"
               style="animation-delay:${Math.min(idx * 18, 220)}ms; border-color:${border}">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <a href="${escapeHtml(t.link)}" target="_blank" rel="noreferrer"
                   class="block text-xl sm:text-[22px] font-semibold tracking-tight hover:underline truncate">
                  ${escapeHtml(t.name)}
                </a>
                <div class="mt-1.5 text-sm text-zinc-400">
                  Tier <span class="text-zinc-200 font-medium">${escapeHtml(t.tier)}</span>
                  <span class="mx-1.5 text-zinc-700">•</span>
                  <span class="text-zinc-200">${escapeHtml(t.license)}</span>
                  <span class="mx-1.5 text-zinc-700">•</span>
                  <span class="text-zinc-200">${escapeHtml(t.type)}</span>
                </div>
              </div>
              <div class="shrink-0 flex items-center gap-2">
                ${statusPill(t.status)}
                <span class="px-2 py-1 rounded-full text-[12px] border border-zinc-800 bg-zinc-900/70 text-zinc-200">
                  ★ ${escapeHtml(t.tier)}
                </span>
              </div>
            </div>

            <p class="mt-3 text-[15px] sm:text-base text-zinc-200 leading-relaxed">
              ${escapeHtml(t.description)}
            </p>

            ${tagsHtml}
          </div>
        `;
      }

      function render(toolsPage, totalCount, maxPage) {
        const grid = document.getElementById("tool-list");
        if (toolsPage.length === 0) {
          grid.innerHTML = `
            <div class="sm:col-span-2 lg:col-span-3 p-6 rounded-2xl border border-zinc-800 bg-zinc-950/60 text-zinc-200">
              No matches.
            </div>
          `;
        } else {
          grid.innerHTML = toolsPage.map((t, idx) => toolCard(t, idx)).join("");
        }

        document.getElementById("countShown").textContent = String(toolsPage.length);
        document.getElementById("countTotal").textContent = String(totalCount);

        document.getElementById("pageNow").textContent = String(PAGE);
        document.getElementById("pageMax").textContent = String(maxPage);
        document.getElementById("pageNow2").textContent = String(PAGE);
        document.getElementById("pageMax2").textContent = String(maxPage);

        const atStart = PAGE <= 1;
        const atEnd = PAGE >= maxPage;

        ["prevPage", "prevPage2"].forEach((id) => (document.getElementById(id).disabled = atStart));
        ["nextPage", "nextPage2"].forEach((id) => (document.getElementById(id).disabled = atEnd));

        ["prevPage", "prevPage2", "nextPage", "nextPage2"].forEach((id) => {
          const el = document.getElementById(id);
          el.classList.toggle("opacity-50", el.disabled);
          el.classList.toggle("cursor-not-allowed", el.disabled);
        });

        document.getElementById("statusText").textContent = "Ready.";
      }

      /******************************************************************
       * UPDATE PIPELINE
       ******************************************************************/
      function update() {
        syncChips();

        const filtered = applyFilters(ALL_TOOLS);
        const sorted = sortTools(filtered);
        const { pageItems, total, maxPage } = paginate(sorted);

        render(pageItems, total, maxPage);
      }

      /******************************************************************
       * FILTER PANEL TOGGLE
       ******************************************************************/
      function setFiltersOpen(open) {
        const wrap = document.getElementById("filtersWrap");
        wrap.classList.toggle("hidden", !open);
      }

      /******************************************************************
       * KEYBIND: Cmd/Ctrl+K focuses search
       ******************************************************************/
      window.addEventListener("keydown", (e) => {
        const isMac = navigator.platform.toLowerCase().includes("mac");
        const mod = isMac ? e.metaKey : e.ctrlKey;
        if (mod && e.key.toLowerCase() === "k") {
          e.preventDefault();
          document.getElementById("search").focus();
        }
      });

      /******************************************************************
       * INIT
       ******************************************************************/
      (async function init() {
        try {
          document.getElementById("statusText").textContent = "Loading…";

          ALL_TOOLS = await loadTools();

          buildAdaptiveFilters(ALL_TOOLS);
          setFiltersOpen(false);

          document.getElementById("search").addEventListener("input", () => {
            PAGE = 1;
            update();
          });

          document.getElementById("sortBy").addEventListener("change", () => {
            PAGE = 1;
            update();
          });

          document.getElementById("perPage").addEventListener("change", () => {
            PAGE = 1;
            update();
          });

          document.getElementById("toggleFilters").addEventListener("click", () => {
            const wrap = document.getElementById("filtersWrap");
            setFiltersOpen(wrap.classList.contains("hidden"));
          });

          document.getElementById("toggleTags").addEventListener("click", () => {
            SHOW_TAGS = !SHOW_TAGS;
            document.getElementById("toggleTags").textContent = SHOW_TAGS ? "🏷 On" : "🏷 Off";
            update();
          });

          document.getElementById("clearAll").addEventListener("click", () => {
            document.getElementById("search").value = "";
            selectedTiers.clear();
            selectedLicenses.clear();
            selectedTypes.clear();
            document.getElementById("sortBy").value = "tier_desc";
            document.getElementById("perPage").value = "12";
            PAGE = 1;
            buildAdaptiveFilters(ALL_TOOLS);
            update();
          });

          function prev() {
            if (PAGE > 1) {
              PAGE--;
              update();
            }
          }

          function next() {
            const filtered = sortTools(applyFilters(ALL_TOOLS));
            const perPage = Number(document.getElementById("perPage").value || 12);
            const maxPage = Math.max(1, Math.ceil(filtered.length / perPage));
            if (PAGE < maxPage) {
              PAGE++;
              update();
            }
          }

          document.getElementById("prevPage").addEventListener("click", prev);
          document.getElementById("prevPage2").addEventListener("click", prev);
          document.getElementById("nextPage").addEventListener("click", next);
          document.getElementById("nextPage2").addEventListener("click", next);

          update();
        } catch (err) {
          console.error(err);
          document.getElementById("statusText").textContent = "Failed to load CSV.";
          document.getElementById("tool-list").innerHTML = `
            <div class="sm:col-span-2 lg:col-span-3 p-6 rounded-2xl border border-red-900/40 bg-red-950/30 text-red-200">
              <div class="font-semibold text-lg">Load error</div>
              <div class="text-sm text-red-200/80 mt-2">
                Check your CSV URL and headers. Expected:
                <code class="text-red-100">name,description,link,tier,license,type,status,tags</code>
              </div>
            </div>
          `;
        }
      })();
    </script>
  </body>
</html>
