<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Gerardo Sacarelo V.">
  <title>🥃 Men Oracle</title>
  <style>
    :root {
      --bg: #0b0b10;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.14);
      --text: #f5f7fb;
      --muted: #aab1c3;
      --accent: #8b5cf6;
      --accent-2: #c084fc;
      --yes: #22c55e;
      --no: #ef4444;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.28), transparent 30%),
        radial-gradient(circle at bottom right, rgba(192, 132, 252, 0.18), transparent 24%),
        linear-gradient(180deg, #09090f 0%, #11111a 100%);
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .shell {
      width: min(100%, 860px);
      margin: auto;
      display: grid;
      gap: 18px;
    }

    .app {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .eyebrow {
      justify-self: center;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 14px rgba(139, 92, 246, 0.8);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .info-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .info-btn,
    .action-btn,
    .answer-badge {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      transition:
        transform 180ms cubic-bezier(.2,.9,.2,1.2),
        box-shadow 180ms ease,
        background 180ms ease,
        border-color 180ms ease,
        filter 180ms ease;
    }

    .info-btn {
      appearance: none;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 12px 16px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .info-emoji {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-size: 1rem;
    }

    .info-label {
      display: inline-block;
      white-space: nowrap;
    }

    .info-btn::before,
    .action-btn::before,
    .answer-badge::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(139,92,246,0.26), rgba(192,132,252,0.04));
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .info-btn:hover,
    .action-btn:hover,
    .answer-badge:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 18px 42px rgba(139, 92, 246, 0.22), 0 0 22px rgba(192, 132, 252, 0.18);
      border-color: rgba(192,132,252,0.35);
      filter: saturate(1.08);
    }

    .info-btn:hover::before,
    .action-btn:hover::before,
    .answer-badge:hover::before {
      opacity: 1;
    }

    .info-btn:active,
    .action-btn:active,
    .answer-badge:active {
      transform: translateY(2px) scale(0.97);
      box-shadow: 0 7px 18px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .content {
      padding: 28px;
      display: grid;
      gap: 20px;
    }

    .card {
      display: grid;
      gap: 20px;
      padding: 22px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .action-btn {
      appearance: none;
      min-height: 72px;
      width: 100%;
      padding: 16px 22px;
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 32px rgba(139, 92, 246, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.03em;
    }

    .action-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .answer-badge {
      min-height: 72px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 22px;
      font-size: clamp(1.45rem, 4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      text-align: center;
    }

    .answer-badge.yes {
      color: #eafff1;
      background: rgba(34, 197, 94, 0.14);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.12), 0 0 30px rgba(34, 197, 94, 0.18);
    }

    .answer-badge.no {
      color: #fff1f1;
      background: rgba(239, 68, 68, 0.14);
      box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.12), 0 0 30px rgba(239, 68, 68, 0.18);
    }

    .answer-wrap {
      display: grid;
      gap: 16px;
      align-items: center;
      justify-items: center;
      text-align: center;
    }

    .gif-shell {
      width: min(100%, 460px);
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,0.20), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(192,132,252,0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      position: relative;
    }

    /* Heart beat animation */
    .heart-beat{
      display:inline-block;
      transform-origin:center;
      animation: heartBeat 2.4s ease-in-out infinite;
      will-change: transform;
    }
      
    @keyframes heartBeat{
      0%   { transform: scale(1); }
      18%  { transform: scale(1.18); }
      36%  { transform: scale(1); }
      54%  { transform: scale(1.12); }
      72%  { transform: scale(1); }
      100% { transform: scale(1); }
    }
      
    .gif-shell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--text);
      background: transparent;
      z-index: 2;
    }

    .placeholder[hidden] {
      display: none !important;
    }

    .placeholder-inner {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .placeholder-orb {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18), rgba(139,92,246,0.24) 35%, rgba(11,11,16,0.08) 65%),
        linear-gradient(135deg, rgba(139,92,246,0.9), rgba(192,132,252,0.6));
      box-shadow:
        0 0 40px rgba(139,92,246,0.34),
        inset 0 0 18px rgba(255,255,255,0.16);
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.12em;
    }

    .placeholder-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .placeholder-sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 28ch;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .error {
      color: #ffd0d0;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 10, 0.68);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(100%, 520px);
      background: rgba(18,18,28,0.94);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .modal-title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .close-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 900;
    }

    .modal-body {
      padding: 20px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.98rem;
    }

    footer {
      text-align: center;
      padding: 16px 8px 4px;
      color: rgba(245,247,251,0.62);
      font-size: 0.9rem;
      letter-spacing: 0.01em;
    }

    @media (max-width: 700px) {
      body { padding: 14px; }
      .hero, .content { padding-left: 18px; padding-right: 18px; }
      .card { padding: 16px; }
      .control-row { grid-template-columns: 1fr; }
      .info-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .info-btn {
        min-width: 0;
        padding: 12px 8px;
        font-size: 0.88rem;
      }
      .info-label {
        display: none;
      }
      .info-emoji {
        font-size: 1.15rem;
      }
      .placeholder-orb {
        width: 92px;
        height: 92px;
        font-size: 1.7rem;
      }
    }

    @media (max-width: 420px) {
      h1 { font-size: 1.8rem; }
      .subtitle { font-size: 0.94rem; }
      .answer-badge { font-size: 1.3rem; letter-spacing: 0.08em; }
      .info-btn { font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="app">
      <section class="hero">
        <div class="eyebrow"><span class="dot"></span>Men Oracle</div>
        <h1>One click. One answer.</h1>
        <p class="subtitle">This is how REAL men solve problems.</p>

        <div class="info-row">
          <button class="info-btn" data-modal="help"><span class="info-emoji">❓</span><span class="info-label">Help</span></button>
          <button class="info-btn" data-modal="about"><span class="info-emoji">✨</span><span class="info-label">About</span></button>
          <button class="info-btn" data-modal="contact"><span class="info-emoji">✉️</span><span class="info-label">Contact</span></button>
          <a class="info-btn" href="../../index.htm"><span class="info-emoji">🏠</span><span class="info-label">Home</span></a>
        </div>
      </section>

      <section class="content">
        <div class="card">
          <div class="control-row">
            <button id="askBtn" class="action-btn">Get Answer</button>
            <div id="answerBadge" class="answer-badge">Ready</div>
          </div>

          <div class="answer-wrap">
            <div class="gif-shell">
              <img id="gifImage" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" alt="Answer GIF" hidden />
              <div id="placeholder" class="placeholder">
                <div class="placeholder-inner">
                  <div class="placeholder-orb">?</div>
                  <div class="placeholder-title">Awaiting Answer</div>
                  <div class="placeholder-sub">Getting Signal from the Cosmos...</div>
                </div>
              </div>
            </div>

            <div class="meta">
              <span id="statusText">Status: idle</span>
            </div>
          </div>

          <div id="errorBox" class="error" hidden></div>
        </div>
      </section>
    </main>

    <footer style="margin-top:10px;  padding:6px 0;  text-align:center;  font-size:12px;  color:var(--muted);  border-top:1px solid var(--border);">
        Built with <span class="heart-beat">❤️</span> by
        <a href="https://www.instagram.com/gerardo711"
           target="_blank"
           rel="noopener"
           style="color:var(--fg); text-decoration:none;">
          Gerardo Sacarelo V.
        </a>
      </footer>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle">Info</h2>
        <button class="close-btn" id="closeModal" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const askBtn = document.getElementById('askBtn');
    const answerBadge = document.getElementById('answerBadge');
    const gifImage = document.getElementById('gifImage');
    const placeholder = document.getElementById('placeholder');
    const statusText = document.getElementById('statusText');
    const errorBox = document.getElementById('errorBox');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeModal = document.getElementById('closeModal');

    const modalContent = {
      help: {
        title: '❓ Help',
        body: 'Just press <strong>Get Answer</strong>. Any question?'
      },
      about: {
        title: '✨ About',
        body: 'A compact yes-or-no micro app built for... blah blah blah. The app fetches a random response and shows the matching GIF. Thank you: https://yesno.wtf'
      },
      contact: {
        title: '✉️ Contact',
        body: 'If you have any question or suggestion, click on the name at the bottom of the page ;)'
      }
    };

    async function fetchAnswer() {
      setLoading(true);
      hideError();

      try {
        const response = await fetch('https://yesno.wtf/api', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderResult(data);
      } catch (error) {
        statusText.textContent = 'Status: failed';
        showError(`Could not load an answer. ${error.message}`);
      } finally {
        askBtn.disabled = false;
      }
    }

    function renderResult(data) {
      const answer = String(data.answer || 'unknown').toLowerCase();
      const image = data.image || '';

      answerBadge.textContent = answer;
      answerBadge.className = 'answer-badge';
      if (answer === 'yes') answerBadge.classList.add('yes');
      if (answer === 'no') answerBadge.classList.add('no');

      statusText.textContent = 'Status: loaded';

      if (image) {
        placeholder.hidden = true;
        gifImage.src = image;
        gifImage.hidden = false;
      } else {
        gifImage.hidden = true;
        gifImage.removeAttribute('src');
        placeholder.hidden = false;
      }
    }

    function setLoading(disabled) {
      askBtn.disabled = disabled;
      answerBadge.textContent = 'Loading...';
      answerBadge.className = 'answer-badge';
      statusText.textContent = 'Status: loading';
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.hidden = false;
    }

    function hideError() {
      errorBox.hidden = true;
      errorBox.textContent = '';
    }

    function openModal(key) {
      const item = modalContent[key];
      if (!item) return;
      modalTitle.innerHTML = item.title;
      modalBody.innerHTML = item.body;
      modal.classList.add('show');
    }

    function closeModalWindow() {
      modal.classList.remove('show');
    }

    askBtn.addEventListener('click', fetchAnswer);

    document.querySelectorAll('button.info-btn[data-modal]').forEach(button => {
      button.addEventListener('click', () => openModal(button.dataset.modal));
    });

    closeModal.addEventListener('click', closeModalWindow);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModalWindow();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModalWindow();
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
